<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anshu is the Best</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      overflow: hidden;
    }
    .card {
      padding: 2rem;
      animation: fade 1.2s ease-out;
    }
    h1 {
      font-size: clamp(2.5rem, 10vw, 6rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      text-shadow: 0 4px 30px rgba(0,0,0,0.25);
    }
    .name {
      background: linear-gradient(90deg, #ffd86f, #fc6262);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    p {
      margin-top: 1rem;
      font-size: clamp(1rem, 3vw, 1.5rem);
      opacity: 0.9;
    }
    .stars { margin-top: 1.5rem; font-size: clamp(1.5rem, 5vw, 2.5rem); }
    @keyframes fade {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1><span class="name">Anshu</span><br>is the Best</h1>
    <p>Undeniably. Officially. Forever.</p>
    <div class="stars">⭐⭐⭐⭐⭐</div>
  </div>
</body>
</html>
